<!DOCTYPE html>
<html>
<head>
    <title>MediLingo | AI Medical Report Summarizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="overlay">
        <header>
            <img src="{{ url_for('static', filename='logo.png') }}" alt="MediLingo Logo" class="logo">
            <h1 class="brand-name">MediLingo</h1>
            <p class="tagline">AI-powered multilingual medical report assistant</p>
        </header>

        <main>
            <form method="post" enctype="multipart/form-data">
                <input type="file" name="file" accept=".txt,.pdf,.docx">
                <button type="submit">Upload & Summarize</button>
            </form>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            {% if summary_en %}
            <div class="results">
                <h2><img src="{{ url_for('static', filename='icon_en.png') }}" class="icon"> Summary (English)</h2>
                <p>{{ summary_en }}</p>

                <h2><img src="{{ url_for('static', filename='icon_hi.png') }}" class="icon"> Summary (Hindi)</h2>
                <p>{{ summary_hi }}</p>

                <h2><img src="{{ url_for('static', filename='icon_pa.png') }}" class="icon"> Summary (Punjabi)</h2>
                <p>{{ summary_pa }}</p>
            </div>
            {% endif %}
        </main>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate">
    <title translate="no">जीवन Raksha – Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
                url('https://plus.unsplash.com/premium_photo-1672759455907-bdaef741cd88?q=80&w=1416&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 440px;
            background: #9fccee;
            border-radius: 18px;
            padding: 30px 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(6px);
        }

        .logo img {
            width: 60px;
            margin-bottom: 10px;
        }

        .app-name {
            font-size: 34px;
            font-weight: 900;
            color: #1b5e20;
        }

        .subtitle {
            font-size: 14px;
            color: #2e7d32;
            margin-bottom: 15px;
        }

        .welcome {
            font-size: 26px;
            font-weight: bold;
            color: #1b5e20;
            margin: 15px 0 20px;
        }

        .msg {
            font-size: 14px;
            color: #c62828;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 30px;
            border: none;
            outline: none;
            font-size: 15px;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.15);
        }

        .password-box {
            position: relative;
        }

        .toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: #6fbf4a;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-login:hover {
            background: #5aaa3f;
        }

        .links {
            margin-top: 18px;
            font-size: 14px;
            color: #1b5e20;
        }

        .links a {
            color: #1b5e20;
            font-weight: bold;
            text-decoration: none;
        }

        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: #2e7d32;
        }

        .footer span {
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="login-card">

        <div class="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png">
        </div>

        <div class="app-name" translate="no">जीवन Raksha</div>
        <div class="subtitle">Rural Healthcare Application</div>

        <div class="welcome" id="welcomeText">स्वागत है</div>

        <!-- FLASH MESSAGES -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
        <div class="msg">{{ msg }}</div>
        {% endfor %}
        {% endwith %}

        <!-- LOGIN FORM -->
        <form method="POST" action="/login_user">

            <div class="input-group">
                <input type="text" name="mobile" id="mobileInput" placeholder="मोबाइल नंबर" required>
            </div>

            <div class="input-group password-box">
                <input type="password" name="password" id="password" placeholder="पासवर्ड / पिन" required>
                <span class="toggle" onclick="togglePassword()">👁</span>
            </div>

            <button class="btn-login" id="loginBtn">लॉगिन करें</button>
        </form>

        <div class="links">
            <span id="newUserText">नया उपयोगकर्ता?</span>
            <a href="/register" id="registerLink">रजिस्टर करें</a>
        </div>

        <div class="footer">
            भाषा:
            <span onclick="setLanguage('hi')">हिंदी</span> |
            <span onclick="setLanguage('en')">English</span>
        </div>
    </div>

    <script>
        function togglePassword() {
            const pass = document.getElementById("password");
            pass.type = pass.type === "password" ? "text" : "password";
        }

        function setLanguage(lang) {
            if (lang === "en") {
                document.getElementById("welcomeText").innerText = "Welcome";
                document.getElementById("mobileInput").placeholder = "Mobile Number";
                document.getElementById("password").placeholder = "Password / PIN";
                document.getElementById("loginBtn").innerText = "Login";
                document.getElementById("newUserText").innerText = "New user?";
                document.getElementById("registerLink").innerText = "Register";
            } else {
                document.getElementById("welcomeText").innerText = "स्वागत है";
                document.getElementById("mobileInput").placeholder = "मोबाइल नंबर";
                document.getElementById("password").placeholder = "पासवर्ड / पिन";
                document.getElementById("loginBtn").innerText = "लॉगिन करें";
                document.getElementById("newUserText").innerText = "नया उपयोगकर्ता?";
                document.getElementById("registerLink").innerText = "रजिस्टर करें";
            }
        }
    </script>

</body>
</html>
